<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erigo Barbers - Agendamento</title>
    <link rel="stylesheet" href="agenda.css">
</head>

<body>
    <div class="box-agenda">
        <header class="header-agenda">
            <div class="logo">
                <h1>ERIGO <span>BARBERS</span></h1>
            </div>
            <a href="login.html" class="btn-voltar">Sair</a>
        </header>

        <div class="boas-vindas" id="texto-boas-vindas">
            <h2>Novo Agendamento</h2>
            <p>Escolha os detalhes para o seu próximo atendimento.</p>
        </div>

        <form id="form-agenda" action="#">

            <div class="secao">
                <h3>1. Escolha o Profissional</h3>
                <div class="grid-profissionais">
                    
                    <input type="radio" id="erick" name="profissional" value="erick" required>
                    <label for="erick" class="card-profissional">
                        <div class="foto-profissional">
                            <img src="Captura de tela 2026-03-02 144704.png" alt="Foto do Barbeiro Erick" />
                        </div>
                        <span class="nome-pro">Diego</span>
                    </label>

                    <input type="radio" id="diego" name="profissional" value="diego" required>
                    <label for="diego" class="card-profissional">
                        <div class="foto-profissional">
                            <img src="Captura de tela 2026-03-02 144711.png" alt="Foto do Barbeiro Diego" />
                        </div>
                        <span class="nome-pro">Erick</span>
                    </label>
                    
                </div>
            </div>

            <div class="secao">
                <h3>2. Escolha os Serviços</h3>
                <div class="grid-servicos">
                    <input type="checkbox" id="corte" name="servico" value="corte">
                    <label for="corte" class="card-servico">
                        <span class="nome">Corte Clássico</span>
                        <span class="preco">R$ 45,00</span>
                    </label>

                    <input type="checkbox" id="barba" name="servico" value="barba">
                    <label for="barba" class="card-servico">
                        <span class="nome">Barba na Navalha</span>
                        <span class="preco">R$ 35,00</span>
                    </label>

                    <input type="checkbox" id="combo" name="servico" value="combo">
                    <label for="combo" class="card-servico">
                        <span class="nome">Combo (Corte + Barba)</span>
                        <span class="preco">R$ 70,00</span>
                    </label>
                </div>
            </div>

            <div class="secao">
                <h3>3. Data e Horário (Atendimento 24h)</h3>
                <div class="calendario-container">
                    <div class="input-box">
                        <label for="data-agenda">Dia do Corte</label>
                        <input type="date" id="data-agenda" name="data-agenda" required>
                    </div>

                    <div class="input-box">
                        <label for="hora-agenda">Horário</label>
                        <input type="time" id="hora-agenda" name="hora-agenda" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-confirmar">Confirmar Agendamento</button>
        </form>

        <div id="tela-sucesso" class="sucesso-container" style="display: none;">
            <div class="icone-check">✔</div>
            <h2>Tudo Certo!</h2>
            <p>Seu horário na Erigo Barbers foi agendado com sucesso. Te esperamos na nossa cadeira!</p>
            <button type="button" class="btn-novo" onclick="window.location.reload()">Fazer novo agendamento</button>
        </div>

    </div>

    <script>
        document.getElementById('form-agenda').addEventListener('submit', function (event) {
            event.preventDefault();

            document.getElementById('form-agenda').style.display = 'none';
            document.getElementById('texto-boas-vindas').style.display = 'none';

            document.getElementById('tela-sucesso').style.display = 'flex';
        });
    </script>
</body>

</html>
