<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erigo Barbers - Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="box-cadastro">
        <div class="logo">
            <h1>ERIGO <span>BARBERS</span></h1>
        </div>
        
        <h2>Junte-se ao Clube</h2>
        
        <form action="#">
            <div class="input-box">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>

            <div class="input-box">
                <label for="telefone">Telefone (WhatsApp)</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
            </div>
            
            <div class="input-box">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Seu melhor e-mail" required>
            </div>
            
            <div class="input-box">
                <label for="senha">Criar Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha forte" required>
            </div>
            
            <button type="submit" class="btn">Cadastrar</button>
        </form>
        
        <p class="link-rodape">Já tem uma conta? <a href="login.html">Faça seu login aqui</a></p>
    </div>
</body>
</html>
